# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "toteat-backlog"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.email.template.magic_link]
subject = "Tu link de acceso · Toteat Roadmap"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "Confirma tu cuenta · Toteat Roadmap"
content_path = "./supabase/templates/confirm_signup.html"

[auth.external.google]
enabled = false

[storage]
enabled = false
